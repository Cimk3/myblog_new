<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理</title>
    <link rel="stylesheet" href="/css/artical.css">
    <script src="/js/artical.js"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">我的博客</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="person.html" target="_blank">个人主页</a></li>
                <li><a href="artical.html" class="active">文章</a></li>
                <li><a href="#">联系我</a></li>
            </ul>
        </div>
    </nav>
    
    <!-- 主要内容区域 -->
    <main>
        <!-- 左侧文章列表 -->
        <aside class="article-list">
            <div class="list-header">
                <h2 class="section-title">文章列表</h2>
                <div class="batch-actions">
                    <label class="select-all">
                        <input type="checkbox" id="selectAll">
                        <span>全选</span>
                    </label>
                    <button id="batchDelete" class="batch-delete-btn">批量删除</button>
                </div>
            </div>
            <ul id="articleList">
                <!-- 文章列表将通过JavaScript动态生成 -->
            </ul>
        </aside>
        
        <!-- 右侧文章内容 -->
        <section class="article-content">
            <div id="articleDisplay">
                <h2 class="article-title">请选择一篇文章</h2>
                <p class="article-placeholder">从左侧列表中选择一篇文章查看内容</p>
            </div>
        </section>
        
        <!-- 新建文章按钮 -->
        <a href="newartical.html" class="new-article-btn">
            <span class="plus-icon">+</span>
        </a>
    </main>
    
    <!-- 页脚 -->
    <footer>
        <div class="footer-content">
            <p>&copy; 2026 我的个人博客 - 保留所有权利</p>
            <p>本网站全用Trae CN完成</p>
        </div>
    </footer>
</body>
</html>
